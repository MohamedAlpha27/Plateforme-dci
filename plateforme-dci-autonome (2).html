<script>
function afficherErreurFatale(titre, detail1, detail2) {
  var el = document.getElementById('erreur-fatale');
  if (!el) {
    el = document.createElement('div');
    el.id = 'erreur-fatale';
    el.style.cssText = 'position:fixed;inset:0;background:#fff;padding:24px;font-family:sans-serif;font-size:13px;color:#B33A3A;z-index:9999;overflow:auto;';
    document.body.appendChild(el);
  }
  el.innerHTML = '<b>' + titre + '</b><br/><br/>' +
    (detail1 || 'Erreur inconnue') + '<br/><br/>' +
    '<span style="color:#8B8578">' + (detail2 || '') + '</span><br/><br/>' +
    '<span style="color:#21242B">Faites une capture d\'écran de ce message et transmettez-la.</span>';
}
window.addEventListener('error', function (e) {
  afficherErreurFatale(
    'Une erreur a empêché l\'ouverture de la plateforme :',
    e.message,
    'Fichier : ' + (e.filename || '—') + ', ligne ' + (e.lineno || '—')
  );
});
window.addEventListener('unhandledrejection', function (e) {
  var raison = e.reason;
  var msg = (raison && (raison.message || raison.toString && raison.toString())) || 'Erreur inconnue';
  afficherErreurFatale(
    'Une opération internet a échoué (connexion, synchronisation) :',
    msg,
    'Vérifiez votre connexion internet et réessayez.'
  );
});
</script>

<script>
// ---- Stockage hybride ----
// Données personnelles (identité) : restent sur cet appareil.
// Données partagées (budget, dépenses, fournisseurs, codes...) : synchronisées via JSONBlob
// (service tiers gratuit, sans authentification — voir avertissement transmis à l'utilisateur).
const SYNC_ID_KEY = "dci_sync_blob_id";
let _memSyncId = null;
function getSyncId() {
  try { return localStorage.getItem(SYNC_ID_KEY) || _memSyncId; } catch (e) { return _memSyncId; }
}
function setSyncId(id) {
  _memSyncId = id;
  try { localStorage.setItem(SYNC_ID_KEY, id); } catch (e) {}
}

async function remoteGetAll() {
  const id = getSyncId();
  if (!id) throw new Error("no_sync_id");
  const res = await fetch("https://jsonblob.com/api/jsonBlob/" + id, {
    headers: { "Accept": "application/json" },
  });
  if (!res.ok) throw new Error("remote_fetch_failed_" + res.status);
  return await res.json();
}
async function remoteSetAll(obj) {
  const id = getSyncId();
  if (!id) throw new Error("no_sync_id");
  const res = await fetch("https://jsonblob.com/api/jsonBlob/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify(obj),
  });
  if (!res.ok) throw new Error("remote_save_failed_" + res.status);
}
async function creerEspacePartage() {
  const res = await fetch("https://jsonblob.com/api/jsonBlob", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify({}),
  });
  const loc = res.headers.get("Location") || res.headers.get("location");
  if (!loc) throw new Error("no_location_header");
  const id = loc.split("/").pop();
  setSyncId(id);
  return id;
}

const _memLocal = {};
window.storage = {
  async get(key, shared) {
    if (!shared) {
      let raw = null;
      try { raw = localStorage.getItem("dci_" + key); } catch (e) { raw = _memLocal["dci_" + key] ?? null; }
      if (raw === null) throw new Error("not_found");
      return { key, value: raw, shared: false };
    }
    const all = await remoteGetAll();
    if (!(key in all)) throw new Error("not_found");
    return { key, value: all[key], shared: true };
  },
  async set(key, value, shared) {
    if (!shared) {
      _memLocal["dci_" + key] = value;
      try { localStorage.setItem("dci_" + key, value); } catch (e) {}
      return { key, value, shared: false };
    }
    let all = {};
    try { all = await remoteGetAll(); } catch (e) {}
    all[key] = value;
    await remoteSetAll(all);
    return { key, value, shared: true };
  },
  async delete(key, shared) {
    if (!shared) {
      delete _memLocal["dci_" + key];
      try { localStorage.removeItem("dci_" + key); } catch (e) {}
      return { key, deleted: true, shared: false };
    }
    let all = {};
    try { all = await remoteGetAll(); } catch (e) {}
    delete all[key];
    await remoteSetAll(all);
    return { key, deleted: true, shared: true };
  },
  async list(prefix) {
    const keys = Object.keys(localStorage).filter(k => k.startsWith("dci_" + (prefix || ""))).map(k => k.slice(4));
    return { keys };
  }
};
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

function EcranConnexionEspace({ onReady }) {
  const [mode, setMode] = useState(null);
  const [idSaisi, setIdSaisi] = useState("");
  const [statut, setStatut] = useState("");
  const [erreur, setErreur] = useState("");

  async function creer() {
    setStatut("Création de l'espace partagé...");
    setErreur("");
    try {
      const id = await creerEspacePartage();
      setStatut("");
      onReady(id);
    } catch (e) {
      setStatut("");
      setErreur("La création a échoué (connexion internet ?). Réessayez, ou demandez à un collègue qui a déjà un espace de vous transmettre son identifiant.");
    }
  }

  function rejoindre() {
    if (!idSaisi.trim()) return;
    setSyncId(idSaisi.trim());
    onReady(idSaisi.trim());
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6" style={{ background: "#F6F4EE" }}>
      <div className="bg-white rounded-xl border p-6 w-full max-w-md" style={{ borderColor: "#E7E1D3" }}>
        <div className="text-[10px] uppercase tracking-wider font-bold mb-1" style={{ color: "#B88A2E" }}>Plateforme DCI</div>
        <h2 className="font-serif text-lg mb-3">Configuration de l'espace partagé</h2>
        {!mode && (
          <div className="space-y-2">
            <p className="text-xs text-gray-500 mb-3">Première ouverture sur cet appareil : créez un nouvel espace, ou rejoignez celui déjà utilisé par vos collègues.</p>
            <button onClick={creer} className="w-full px-4 py-2.5 rounded-lg text-sm font-bold text-white" style={{ background: "#6E1423" }}>Créer un nouvel espace partagé</button>
            <button onClick={() => setMode("rejoindre")} className="w-full px-4 py-2.5 rounded-lg text-sm font-bold" style={{ background: "#fff", border: "1px solid #E7E1D3", color: "#21242B" }}>Rejoindre un espace existant</button>
          </div>
        )}
        {mode === "rejoindre" && (
          <div>
            <label className="text-xs font-bold block mb-1.5">Identifiant transmis par votre collègue</label>
            <input value={idSaisi} onChange={(e) => setIdSaisi(e.target.value)} placeholder="Ex. 8f3a1c2b-..."
              className="w-full px-3 py-2.5 rounded-lg border text-sm mb-3" style={{ borderColor: "#DCD5C4", background: "#FCFAF5" }} />
            <div className="flex gap-2">
              <button onClick={() => setMode(null)} className="px-4 py-2.5 rounded-lg text-sm font-bold" style={{ color: "#8B8578" }}>Retour</button>
              <button onClick={rejoindre} className="flex-1 px-4 py-2.5 rounded-lg text-sm font-bold text-white" style={{ background: "#6E1423" }}>Rejoindre</button>
            </div>
          </div>
        )}
        {statut && <p className="text-xs text-gray-500 mt-3">{statut}</p>}
        {erreur && <p className="text-xs mt-3" style={{ color: "#B33A3A" }}>{erreur}</p>}
      </div>
    </div>
  );
}

  const [pret, setPret] = useState(!!getSyncId());

function gnf(n) {
  return (Number(n) || 0).toLocaleString("fr-FR") + " GNF";
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function startOfWeekISO() {
  const d = new Date();
  const day = d.getDay(); // 0=dimanche
  const diff = (day === 0 ? -6 : 1) - day; // lundi
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}
function startOfMonthISO() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10);
}
function fmtDateFR(iso) {
  if (!iso) return "—";
  return new Date(iso + "T00:00:00").toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });

// Seuils de validation — livrable 8 : Workflow des validations
function roleRequis(montant) {
  const m = Number(montant) || 0;
  if (m < 500000) return "Chef de division";
  if (m < 2000000) return "Gestionnaire administratif";
  if (m < 10000000) return "Directeur Général";
  return "Directeur Général";
}

  const m = Number(montant) || 0;
  if (m < 500000) return "< 500 000 GNF";
  if (m < 2000000) return "500 000 – 2 000 000 GNF";
  if (m < 10000000) return "2 000 000 – 10 000 000 GNF";
  return "> 10 000 000 GNF (information Présidence recommandée)";
}

function IdEspacePartage() {
  const [copie, setCopie] = useState(false);
  const id = getSyncId();
  async function copier() {
    try {
      await navigator.clipboard.writeText(id);
      setCopie(true);
      setTimeout(() => setCopie(false), 2000);
    } catch (e) {}
  }
  if (!id) return null;
  return (
    <div className="px-5 pb-4 text-[10px] opacity-70">
      <div className="uppercase tracking-wide mb-1" style={{ color: "#E9D9C3" }}>Identifiant de l'espace partagé</div>
      <button onClick={copier} className="w-full text-left px-2 py-1.5 rounded truncate" style={{ background: "rgba(255,255,255,0.08)", color: "#fff" }} title={id}>
        {copie ? "Copié ✓" : id}
      </button>
    </div>
  );
}

function App() {
  const [data, setData] = useState(emptyData);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");
  const [tab, setTab] = useState("dashboard");
  const [me, setMe] = useState(null);
  const [meOpen, setMeOpen] = useState(false);
  const [guideOpen, setGuideOpen] = useState(false);
  const [codes, setCodes] = useState({});

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("dci-identity", false);
        const val = res && res.value ? JSON.parse(res.value) : null;
        setMe(val);
        if (!val) setMeOpen(true);
      } catch (e) {
        setMe(null);
        setMeOpen(true);
      }
    })();
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("dci-codes", true);
        setCodes(res && res.value ? JSON.parse(res.value) : {});
      } catch (e) {
        setCodes({});
      }
    })();
  }, []);

  async function saveCodes(next) {
    setCodes(next);
    try {
      await window.storage.set("dci-codes", JSON.stringify(next), true);
    } catch (e) {}
  }

  async function saveMe(nom, role) {
    const next = { nom, role };
    setMe(next);
    try {
      await window.storage.set("dci-identity", JSON.stringify(next), false);
    } catch (e) {}
    setMeOpen(false);
  }

  useEffect(() => {
    async function chargerDonnees() {
      try {
        const res = await window.storage.get(STORAGE_KEY, true);
        const parsed = res && res.value ? JSON.parse(res.value) : emptyData;
        const migrated = {
          ...emptyData,
          ...parsed,
          fournisseurs: (parsed.fournisseurs || []).map((f) => {
            const factures = (f.factures || []).map((fa) => {
              if (Array.isArray(fa.paiements)) return fa;
              const paiements = fa.statut === "payee"
                ? [{ id: uid(), montant: Number(fa.montant) || 0, date: fa.datePaiement || todayISO(), mode: fa.modePaiement || "Non précisé", reference: fa.numeroRecu || "" }]
                : [];
              const { statut, datePaiement, modePaiement, numeroRecu, ...rest } = fa;
              return { ...rest, paiements };
            });
            if (Array.isArray(f.factures)) return { ...f, factures };
            // très anciens fournisseurs (avant les factures elles-mêmes)
            const legacyFactures = Number(f.soldeDu) > 0 ? [{ id: uid(), objet: "Solde initial", montant: Number(f.soldeDu), date: todayISO(), paiements: [] }] : [];
            const { soldeDu, ...rest } = f;
            return { ...rest, factures: legacyFactures };
          }),
        };
        setData(migrated);
      } catch (e) {
        // Rien n'est encore enregistré : on initialise avec le budget de fonctionnement
        // du 2e trimestre transmis par l'utilisateur.
        const seeded = {
          ...emptyData,
          lignes: [
            {
              id: uid(),
              libelle: "Fonctionnement",
              division: "",
              periode: "2e trimestre 2026",
              alloue: 960000000,
              engage: 0,
            },
          ],
        };
        setData(seeded);
        try {
          await window.storage.set(STORAGE_KEY, JSON.stringify(seeded), true);
        } catch (e2) {
          setError("Impossible d'enregistrer la ligne budgétaire initiale. Vous pouvez la saisir manuellement dans l'onglet Budget.");
        }
      } finally {
        setLoading(false);
      }
    }
    chargerDonnees();
    const intervalId = setInterval(chargerDonnees, 20000); // synchronisation avec les collègues
    return () => clearInterval(intervalId);
  }, []);

  async function persist(next) {
    setData(next);
    setSaving(true);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next), true);
      setError("");
    } catch (e) {
      setError("La sauvegarde a échoué. Vos dernières modifications ne sont peut-être pas enregistrées.");
    } finally {
      setSaving(false);
    }
  }

  // ---- Actions ----
  function addLigne(ligne) {
    const next = { ...data, lignes: [...data.lignes, { id: uid(), engage: 0, ...ligne }] };
    persist(next);
  }
  function deleteLigne(id) {
    if (data.depenses.some((d) => d.ligneId === id)) return;
    persist({ ...data, lignes: data.lignes.filter((l) => l.id !== id) });
  }
  function addFournisseur(f) {
    persist({ ...data, fournisseurs: [...data.fournisseurs, { id: uid(), factures: [], ...f }] });
  }
  function deleteFournisseur(id) {
    persist({ ...data, fournisseurs: data.fournisseurs.filter((f) => f.id !== id) });
  }
  function addFacture(fournisseurId, facture) {
    const fournisseurs = data.fournisseurs.map((f) =>
      f.id === fournisseurId ? { ...f, factures: [{ id: uid(), date: todayISO(), paiements: [], ...facture }, ...(f.factures || [])] } : f
    );
    persist({ ...data, fournisseurs });
  }
  function addPaiementFacture(fournisseurId, factureId, paiement) {
    const auteur = me ? `${me.nom} (${me.role})` : "Non identifié";
    const facture = (data.fournisseurs.find((f) => f.id === fournisseurId)?.factures || []).find((fa) => fa.id === factureId);
    const fournisseurs = data.fournisseurs.map((f) => {
      if (f.id !== fournisseurId) return f;
      return {
        ...f,
        factures: (f.factures || []).map((fa) =>
          fa.id === factureId
            ? { ...fa, paiements: [{ id: uid(), date: todayISO(), enregistrePar: auteur, ...paiement }, ...(fa.paiements || [])] }
            : fa
        ),
      };
    });
    let lignes = data.lignes;
    if (facture && facture.ligneId) {
      lignes = lignes.map((l) => (l.id === facture.ligneId ? { ...l, engage: (Number(l.engage) || 0) + Number(paiement.montant) } : l));
    }
    persist({ ...data, fournisseurs, lignes });
  }
  function deletePaiementFacture(fournisseurId, factureId, paiementId) {
    const facture = (data.fournisseurs.find((f) => f.id === fournisseurId)?.factures || []).find((fa) => fa.id === factureId);
    const paiement = (facture?.paiements || []).find((p) => p.id === paiementId);
    const fournisseurs = data.fournisseurs.map((f) => {
      if (f.id !== fournisseurId) return f;
      return {
        ...f,
        factures: (f.factures || []).map((fa) =>
          fa.id === factureId ? { ...fa, paiements: (fa.paiements || []).filter((p) => p.id !== paiementId) } : fa
        ),
      };
    });
    let lignes = data.lignes;
    if (facture && facture.ligneId && paiement) {
      lignes = lignes.map((l) => (l.id === facture.ligneId ? { ...l, engage: Math.max(0, (Number(l.engage) || 0) - Number(paiement.montant)) } : l));
    }
    persist({ ...data, fournisseurs, lignes });
  }
  function deleteFacture(fournisseurId, factureId) {
    const facture = (data.fournisseurs.find((f) => f.id === fournisseurId)?.factures || []).find((fa) => fa.id === factureId);
    const totalPaye = (facture?.paiements || []).reduce((s, p) => s + (Number(p.montant) || 0), 0);
    const fournisseurs = data.fournisseurs.map((f) =>
      f.id === fournisseurId ? { ...f, factures: (f.factures || []).filter((fa) => fa.id !== factureId) } : f
    );
    let lignes = data.lignes;
    if (facture && facture.ligneId && totalPaye > 0) {
      lignes = lignes.map((l) => (l.id === facture.ligneId ? { ...l, engage: Math.max(0, (Number(l.engage) || 0) - totalPaye) } : l));
    }
    persist({ ...data, fournisseurs, lignes });
  }
  function attacherLigneFacture(fournisseurId, factureId, ligneId) {
    const facture = (data.fournisseurs.find((f) => f.id === fournisseurId)?.factures || []).find((fa) => fa.id === factureId);
    if (!facture || facture.ligneId) return; // déjà rattachée, on ne recalcule pas deux fois
    const totalDejaPaye = (facture.paiements || []).reduce((s, p) => s + (Number(p.montant) || 0), 0);
    const fournisseurs = data.fournisseurs.map((f) => {
      if (f.id !== fournisseurId) return f;
      return { ...f, factures: (f.factures || []).map((fa) => (fa.id === factureId ? { ...fa, ligneId } : fa)) };
    });
    const lignes = data.lignes.map((l) => (l.id === ligneId ? { ...l, engage: (Number(l.engage) || 0) + totalDejaPaye } : l));
    persist({ ...data, fournisseurs, lignes });
  }
  function addDepense(dep) {
    const next = { ...data, depenses: [{ id: uid(), statut: "attente", date: todayISO(), creePar: me ? `${me.nom} (${me.role})` : "Non identifié", ...dep }, ...data.depenses] };
    persist(next);
  }
  function addDepensesLot(ligneId, items) {
    const auteur = me ? `${me.nom} (${me.role})` : "Non identifié";
    const nouvelles = items.map((it) => ({
      id: uid(),
      statut: "attente",
      date: todayISO(),
      creePar: auteur,
      objet: `Prime — ${it.nom}`,
      ligneId,
      montant: Number(it.montant),
      demandeur: it.nom,
    }));
    persist({ ...data, depenses: [...nouvelles, ...data.depenses] });
  }
  function updateDepenseStatut(id, statut) {
    const dep = data.depenses.find((d) => d.id === id);
    if (!dep) return;
    let lignes = data.lignes;
    if (statut === "validee" && dep.statut !== "validee") {
      lignes = lignes.map((l) => (l.id === dep.ligneId ? { ...l, engage: (Number(l.engage) || 0) + Number(dep.montant) } : l));
    }
    if (statut === "rejetee" && dep.statut === "validee") {
      lignes = lignes.map((l) => (l.id === dep.ligneId ? { ...l, engage: Math.max(0, (Number(l.engage) || 0) - Number(dep.montant)) } : l));
    }
    const traitePar = me ? `${me.nom} (${me.role})` : "Non identifié";
    const depenses = data.depenses.map((d) => (d.id === id ? { ...d, statut, traitePar } : d));
    persist({ ...data, lignes, depenses });
  }
  function deleteDepense(id) {
    const dep = data.depenses.find((d) => d.id === id);
    if (!dep) return;
    let lignes = data.lignes;
    if (dep.statut === "validee" || dep.statut === "payee") {
      lignes = lignes.map((l) => (l.id === dep.ligneId ? { ...l, engage: Math.max(0, (Number(l.engage) || 0) - Number(dep.montant)) } : l));
    }
    persist({ ...data, lignes, depenses: data.depenses.filter((d) => d.id !== id) });
  }

  const totals = useMemo(() => {
    const alloue = data.lignes.reduce((s, l) => s + (Number(l.alloue) || 0), 0);
    const engage = data.lignes.reduce((s, l) => s + (Number(l.engage) || 0), 0);
    const enAttente = data.depenses.filter((d) => d.statut === "attente");
    const soldeFournisseurs = data.fournisseurs.reduce((s, f) => {
      const du = (f.factures || []).reduce((s2, fa) => {
        const paye = (fa.paiements || []).reduce((s3, p) => s3 + (Number(p.montant) || 0), 0);
        return s2 + Math.max(0, (Number(fa.montant) || 0) - paye);
      }, 0);
      return s + du;
    }, 0);
    return { alloue, engage, disponible: alloue - engage, enAttente, soldeFournisseurs };
  }, [data]);

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: PAPER }}>
        <Loader2 className="animate-spin" color={BORDEAUX} size={28} />
      </div>
    );
  }

  const NAV = [
    { id: "dashboard", label: "Tableau de bord", icon: LayoutDashboard },
    { id: "budget", label: "Budget", icon: Wallet },
    { id: "depenses", label: "Dépenses", icon: Receipt },
    { id: "fournisseurs", label: "Fournisseurs", icon: Building2 },
    { id: "rapport", label: "Rapport", icon: FileText },
    { id: "projet", label: "Projet", icon: Map },
  ];

  return (
    <div className="min-h-screen flex font-sans" style={{ background: PAPER }}>
      {/* Sidebar (desktop / tablette) */}
      <aside className="hidden md:flex w-60 flex-shrink-0 text-white flex-col" style={{ background: `linear-gradient(180deg, ${BORDEAUX} 0%, ${BORDEAUX_DARK} 100%)` }}>
        <div className="px-5 py-6 flex items-center gap-3">
          <div className="w-9 h-9 rounded-full border flex items-center justify-center font-serif text-sm" style={{ borderColor: OR, color: OR }}>RG</div>
          <div>
            <div className="text-sm font-bold leading-tight">Plateforme DCI</div>
            <div className="text-[11px] opacity-70 leading-tight">Présidence de la République</div>
          </div>
        </div>
        <nav className="px-3 mt-2 flex-1">
          {NAV.map((item) => {
            const Icon = item.icon;
            const active = tab === item.id;
            return (
              <button
                key={item.id}
                onClick={() => setTab(item.id)}
                className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1 text-sm transition-colors"
                style={{ background: active ? "rgba(255,255,255,0.14)" : "transparent", fontWeight: active ? 700 : 400 }}
              >
                <Icon size={16} color={active ? "#fff" : "#E9D9C3"} />
                <span style={{ color: active ? "#fff" : "#E9D9C3" }}>{item.label}</span>
              </button>
            );
          })}
        </nav>
        <div className="px-3">
          <button onClick={() => setMeOpen(true)} className="w-full text-left px-3 py-2.5 rounded-lg mb-2 text-xs" style={{ background: "rgba(255,255,255,0.08)" }}>
            <div className="opacity-60 text-[9.5px] uppercase tracking-wide mb-0.5">Connecté en tant que</div>
            <div className="font-bold" style={{ color: "#fff" }}>{me ? `${me.nom} — ${me.role}` : "Non identifié · cliquer ici"}</div>
          </button>
        </div>
        <div className="px-5 py-4 text-[10px] opacity-60 border-t" style={{ borderColor: "rgba(255,255,255,0.15)" }}>
          {saving ? "Enregistrement..." : "Données enregistrées"}
        </div>
        <IdEspacePartage />
      </aside>

      {meOpen && <IdentityModal me={me} codes={codes} onSave={saveMe} onClose={() => setMeOpen(false)} />}

      {/* Barre de navigation mobile */}
      <div className="md:hidden fixed bottom-0 left-0 right-0 z-20 flex overflow-x-auto text-white" style={{ background: BORDEAUX_DARK }}>
        {NAV.map((item) => {
          const Icon = item.icon;
          const active = tab === item.id;
          return (
            <button
              key={item.id}
              onClick={() => setTab(item.id)}
              className="flex-shrink-0 flex flex-col items-center gap-1 py-2.5 px-4"
              style={{ background: active ? "rgba(255,255,255,0.14)" : "transparent" }}
            >
              <Icon size={17} color={active ? "#fff" : "#E9D9C3"} />
              <span className="text-[9.5px] font-bold whitespace-nowrap" style={{ color: active ? "#fff" : "#E9D9C3" }}>{item.label}</span>
            </button>
          );
        })}
      </div>

      {/* Main */}
      <main className="flex-1 min-w-0">
        <header className="bg-white border-b px-5 md:px-8 py-4 flex items-center justify-between" style={{ borderColor: "#E7E1D3" }}>
          <div>
            <div className="text-[10px] uppercase tracking-wider font-bold" style={{ color: OR }}>Plateforme DCI</div>
            <h1 className="text-xl font-serif" style={{ color: "#21242B" }}>{NAV.find((n) => n.id === tab)?.label}</h1>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setGuideOpen(true)} className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{ background: "#F6F0E0", color: "#8F6A21" }} title="Guide d'utilisation">
              ?
            </button>
            <button onClick={() => setMeOpen(true)} className="md:hidden text-[10px] font-bold px-3 py-1.5 rounded-full" style={{ background: "#F6F0E0", color: "#8F6A21" }}>
              {me ? me.nom.split(" ")[0] : "S'identifier"}
            </button>
          </div>
        </header>

        {guideOpen && <GuideModal onClose={() => setGuideOpen(false)} />}

        {error && (
          <div className="mx-8 mt-4 px-4 py-3 rounded-lg text-sm flex items-center justify-between gap-2" style={{ background: "#FBE7E5", color: "#B33A3A" }}>
            <span className="flex items-center gap-2"><AlertTriangle size={16} /> {error}</span>
            <button onClick={() => setError("")}><X size={15} color="#B33A3A" /></button>
          </div>
        )}

        <div className="p-5 md:p-8 pb-24 md:pb-8">
          {tab === "dashboard" && <Dashboard data={data} totals={totals} onGo={setTab} />}
          {tab === "budget" && <BudgetTab lignes={data.lignes} depenses={data.depenses} onAdd={addLigne} onDelete={deleteLigne} />}
          {tab === "depenses" && (
            <DepensesTab lignes={data.lignes} depenses={data.depenses} onAdd={addDepense} onAddLot={addDepensesLot} onStatut={updateDepenseStatut} onDelete={deleteDepense} me={me} />
          )}
          {tab === "fournisseurs" && (
            <FournisseursTab
              fournisseurs={data.fournisseurs}
              lignes={data.lignes}
              onAdd={addFournisseur}
              onDelete={deleteFournisseur}
              onAddFacture={addFacture}
              onAddPaiement={addPaiementFacture}
              onDeletePaiement={deletePaiementFacture}
              onDeleteFacture={deleteFacture}
              onAttacherLigne={attacherLigneFacture}
            />
          )}
          {tab === "rapport" && <RapportTab data={data} />}
          {tab === "projet" && <ProjetTab codes={codes} onSaveCodes={saveCodes} />}
        </div>
      </main>
    </div>
  );
}

// ---------------- Dashboard ----------------
function Dashboard({ data, totals, onGo }) {
  const kpis = [
    { label: "Budget alloué", value: gnf(totals.alloue), icon: Wallet, color: BORDEAUX },
    { label: "Budget engagé", value: gnf(totals.engage), icon: TrendingUp, color: OR },
    { label: "Disponible", value: gnf(totals.disponible), icon: Banknote, color: "#2F6844" },
    { label: "Dépenses en attente", value: totals.enAttente.length, icon: Clock, color: "#B33A3A" },
  ];
  return (
    <div>
      {data.lignes.length === 0 && data.depenses.length === 0 && data.fournisseurs.length === 0 ? (
        <EmptyState onGo={onGo} />
      ) : (
        <>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            {kpis.map((k) => (
              <div key={k.label} className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
                <div className="flex items-center justify-between mb-3">
                  <span className="text-[10px] uppercase tracking-wide font-bold text-gray-500">{k.label}</span>
                  <k.icon size={16} color={k.color} />
                </div>
                <div className="font-serif text-2xl" style={{ color: "#21242B" }}>{k.value}</div>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-sm font-bold">Demandes en attente de validation</h3>
                <button onClick={() => onGo("depenses")} className="text-xs font-bold flex items-center gap-1" style={{ color: BORDEAUX }}>
                  Voir tout <ChevronRight size={13} />
                </button>
              </div>
              {totals.enAttente.length === 0 ? (
                <p className="text-xs text-gray-400">Aucune demande en attente.</p>
              ) : (
                <ul className="space-y-2">
                  {totals.enAttente.slice(0, 5).map((d) => (
                    <li key={d.id} className="flex items-center justify-between text-xs border-b pb-2" style={{ borderColor: "#F0EBDF" }}>
                      <span className="truncate pr-2">{d.objet}</span>
                      <span className="font-bold flex-shrink-0">{gnf(d.montant)}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-sm font-bold">Lignes budgétaires</h3>
                <button onClick={() => onGo("budget")} className="text-xs font-bold flex items-center gap-1" style={{ color: BORDEAUX }}>
                  Voir tout <ChevronRight size={13} />
                </button>
              </div>
              {data.lignes.length === 0 ? (
                <p className="text-xs text-gray-400">Aucune ligne budgétaire créée.</p>
              ) : (
                <ul className="space-y-3">
                  {data.lignes.slice(0, 5).map((l) => {
                    const disp = (Number(l.alloue) || 0) - (Number(l.engage) || 0);
                    const pct = l.alloue ? Math.min(100, Math.round(((Number(l.engage) || 0) / l.alloue) * 100)) : 0;
                    return (
                      <li key={l.id}>
                        <div className="flex justify-between text-xs mb-1">
                          <span className="truncate pr-2">{l.libelle}</span>
                          <span className="text-gray-500 flex-shrink-0">{gnf(disp)} dispo.</span>
                        </div>
                        <div className="h-1.5 rounded-full bg-gray-100 overflow-hidden">
                          <div className="h-full rounded-full" style={{ width: pct + "%", background: pct > 90 ? "#B33A3A" : OR }} />
                        </div>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function EmptyState({ onGo }) {
  return (
    <div className="bg-white rounded-xl border p-10 text-center max-w-lg mx-auto mt-10" style={{ borderColor: "#E7E1D3" }}>
      <div className="w-12 h-12 rounded-full mx-auto mb-4 flex items-center justify-center" style={{ background: "#F6F0E0" }}>
        <Wallet size={20} color={OR} />
      </div>
      <h3 className="font-serif text-lg mb-2">Commencez par créer votre budget</h3>
      <p className="text-sm text-gray-500 mb-5">Avant de saisir des dépenses, ajoutez au moins une ligne budgétaire (ex. « Communication institutionnelle », « Fonctionnement »).</p>

}

                      <td className="px-4 py-3 text-gray-500">{l.periode || "—"}</td>

                      <td className="px-4 py-3">{gnf(l.engage)}</td>

                      <td className="px-4 py-3 text-right">

          </button>

            <Field label="Demandeur" value={form.demandeur} onChange={(v) => setForm({ ...form, demandeur: v })} placeholder="Nom du demandeur" />
            <div>
              <label className="text-xs font-bold block mb-1.5">Ligne budgétaire</label>

                    <td className="px-4 py-3">

  );

function PrimesForm({ lignes, onSubmit }) {
  const [ligneId, setLigneId] = useState("");
  const [agents, setAgents] = useState([{ nom: "", montant: "" }]);

  function majAgent(i, champ, val) {
    setAgents(agents.map((a, idx) => (idx === i ? { ...a, [champ]: val } : a)));
  }
  function ajouterLigne() {
    setAgents([...agents, { nom: "", montant: "" }]);
  }
  function retirerLigne(i) {
    setAgents(agents.filter((_, idx) => idx !== i));
  }
  const total = agents.reduce((s, a) => s + (Number(a.montant) || 0), 0);
  const valides = agents.filter((a) => a.nom && Number(a.montant) > 0);
  const ligne = lignes.find((l) => l.id === ligneId);
  const disponible = ligne ? (Number(ligne.alloue) || 0) - (Number(ligne.engage) || 0) : null;

  function submit(e) {
    e.preventDefault();
    if (!ligneId || valides.length === 0) return;
    onSubmit(ligneId, valides);
  }

  return (
    <form onSubmit={submit} className="bg-white rounded-xl border p-5 mb-5" style={{ borderColor: "#E7E1D3" }}>
      <div className="mb-3">
        <label className="text-xs font-bold block mb-1.5">Ligne budgétaire pour ces primes</label>
        <select value={ligneId} onChange={(e) => setLigneId(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border text-sm" style={{ borderColor: "#DCD5C4", background: "#FCFAF5" }}>
          <option value="">Sélectionner... (ex. « Primes et indemnités »)</option>
          {lignes.map((l) => <option key={l.id} value={l.id}>{l.libelle}</option>)}
        </select>
      </div>

      <div className="space-y-2 mb-3">
        {agents.map((a, i) => (
          <div key={i} className="grid grid-cols-1 md:grid-cols-[1fr_1fr_auto] gap-2 items-end">
            <Field label={i === 0 ? "Nom de l'agent" : ""} value={a.nom} onChange={(v) => majAgent(i, "nom", v)} placeholder="Ex. Mamadou Diallo" />
            <Field label={i === 0 ? "Montant (GNF)" : ""} type="number" value={a.montant} onChange={(v) => majAgent(i, "montant", v)} placeholder="0" />
            {agents.length > 1 && (
              <button type="button" onClick={() => retirerLigne(i)} className="px-2 py-2.5"><Trash2 size={15} color="#B33A3A" /></button>
            )}
          </div>
        ))}
      </div>

      <button type="button" onClick={ajouterLigne} className="text-xs font-bold mb-4" style={{ color: BORDEAUX }}>+ Ajouter un agent</button>

      {ligne && (
        <div className="mb-3 px-4 py-2.5 rounded-lg text-xs" style={{ background: total > disponible ? "#FBE7E5" : "#F6F0E0", color: total > disponible ? "#B33A3A" : "#8F6A21" }}>
          Total des primes : <b>{gnf(total)}</b> — Disponible sur « {ligne.libelle} » : <b>{gnf(disponible)}</b>
          {total > disponible && " — attention, ce total dépasse le disponible."}
        </div>
      )}

      <button type="submit" disabled={!ligneId || valides.length === 0} className="px-4 py-2.5 rounded-lg text-sm font-bold text-white disabled:opacity-40" style={{ background: OR }}>
        Enregistrer {valides.length > 0 ? `${valides.length} prime${valides.length > 1 ? "s" : ""}` : "les primes"}
      </button>
      <p className="text-[11px] text-gray-400 mt-2">Chaque agent devient une demande de dépense distincte, avec son propre niveau de validation requis selon son montant.</p>
    </form>
  );
}

function FournisseursTab({ fournisseurs, lignes, onAdd, onDelete, onAddFacture, onAddPaiement, onDeletePaiement, onDeleteFacture, onAttacherLigne }) {
  const [open, setOpen] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [form, setForm] = useState({ nom: "", categorie: "", contact: "" });
  const [warn, setWarn] = useState(false);

  function submit(e) {
    e.preventDefault();
    if (!form.nom) {
      setWarn(true);
      return;
    }
    onAdd({ nom: form.nom, categorie: form.categorie, contact: form.contact });
    setForm({ nom: "", categorie: "", contact: "" });
    setWarn(false);
    setOpen(false);
  }

  function resteDu(fa) {
    const paye = (fa.paiements || []).reduce((s, p) => s + (Number(p.montant) || 0), 0);
    return Math.max(0, (Number(fa.montant) || 0) - paye);
  }

  return (
    <div>
      <div className="flex justify-end mb-4">
        <button onClick={() => setOpen(!open)} className="px-4 py-2 rounded-lg text-sm font-bold text-white flex items-center gap-2" style={{ background: BORDEAUX }}>
          <Plus size={15} /> Nouveau fournisseur
        </button>
      </div>

      {open && (
        <form onSubmit={submit} className="bg-white rounded-xl border p-5 mb-5 grid grid-cols-1 md:grid-cols-3 gap-3 items-end" style={{ borderColor: "#E7E1D3" }}>
          <Field label="Nom *" value={form.nom} onChange={(v) => setForm({ ...form, nom: v })} placeholder="Ex. Imprimerie Sonfonia" />
          <Field label="Catégorie" value={form.categorie} onChange={(v) => setForm({ ...form, categorie: v })} placeholder="Ex. Imprimeur" />
          <Field label="Contact" value={form.contact} onChange={(v) => setForm({ ...form, contact: v })} placeholder="Téléphone / email" />
          {warn && <p className="text-xs text-red-600 md:col-span-3">Le nom du fournisseur est obligatoire.</p>}
          <button type="submit" className="px-4 py-2.5 rounded-lg text-sm font-bold text-white" style={{ background: OR, width: "fit-content" }}>Ajouter le fournisseur</button>
        </form>
      )}

      {fournisseurs.length === 0 ? (
        <p className="text-sm text-gray-400">Aucun fournisseur enregistré.</p>
      ) : (
        <div className="space-y-3">
          {fournisseurs.map((f) => {
            const factures = f.factures || [];
            const solde = factures.reduce((s, fa) => s + resteDu(fa), 0);
            const isOpen = expanded === f.id;
            return (
              <div key={f.id} className="bg-white rounded-xl border overflow-hidden" style={{ borderColor: "#E7E1D3" }}>
                <button onClick={() => setExpanded(isOpen ? null : f.id)} className="w-full flex items-center justify-between p-4 text-left">
                  <div className="flex items-center gap-3">
                    <div>
                      <div className="font-serif text-base">{f.nom}</div>
                      <div className="text-[11px] text-gray-500">{f.categorie || "—"} {f.contact ? `· ${f.contact}` : ""}</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="text-right">
                      <div className="text-[10px] uppercase text-gray-400">Solde dû</div>
                      <div className="font-bold" style={{ color: solde > 0 ? "#B33A3A" : "#2F6844" }}>{gnf(solde)}</div>
                    </div>
                    <ChevronRight size={16} className={isOpen ? "rotate-90" : ""} style={{ transition: "transform .15s" }} />
                  </div>
                </button>

                {isOpen && (
                  <div className="border-t p-4" style={{ borderColor: "#F0EBDF", background: "#FAF8F3" }}>
                    <FactureForm lignes={lignes} onAdd={(fa) => onAddFacture(f.id, fa)} />
                    {factures.length === 0 ? (
                      <p className="text-xs text-gray-400 mt-3">Aucune facture enregistrée pour ce fournisseur.</p>
                    ) : (
                      <div className="mt-4 space-y-2">
                        {factures.map((fa) => (
                          <FactureRow
                            key={fa.id}
                            facture={fa}
                            lignes={lignes}
                            resteDu={resteDu(fa)}
                            onAjouterPaiement={(paiement) => onAddPaiement(f.id, fa.id, paiement)}
                            onSupprimerPaiement={(paiementId) => onDeletePaiement(f.id, fa.id, paiementId)}
                            onDelete={() => onDeleteFacture(f.id, fa.id)}
                            onAttacherLigne={(ligneId) => onAttacherLigne(f.id, fa.id, ligneId)}
                          />
                        ))}
                      </div>
                    )}
                    <div className="flex justify-end mt-3">
                      <button onClick={() => onDelete(f.id)} className="text-xs font-bold flex items-center gap-1" style={{ color: "#B33A3A" }}>
                        <Trash2 size={13} /> Supprimer ce fournisseur
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FactureRow({ facture, lignes, resteDu, onAjouterPaiement, onSupprimerPaiement, onDelete, onAttacherLigne }) {
  const [payOpen, setPayOpen] = useState(false);
  const [montant, setMontant] = useState(resteDu);
  const [mode, setMode] = useState("Espèces");
  const [reference, setReference] = useState("");
  const [datePaiement, setDatePaiement] = useState(todayISO());
  const [ligneChoisie, setLigneChoisie] = useState("");
  const paiements = facture.paiements || [];
  const montantPaye = paiements.reduce((s, p) => s + (Number(p.montant) || 0), 0);
  const soldee = resteDu <= 0;
  const estAvance = montant && Number(montant) < resteDu;
  const ligne = (lignes || []).find((l) => l.id === facture.ligneId);

  function ouvrirPaiement() {
    setMontant(resteDu);
    setReference("");
    setPayOpen(true);
  }

  function confirmer() {
    const m = Number(montant);
    if (!m || m <= 0) return;
    onAjouterPaiement({ montant: Math.min(m, resteDu), mode, reference, date: datePaiement });
    setPayOpen(false);
  }

  const referenceLabel = mode === "Chèque" ? "Numéro de chèque *" : "Numéro de reçu (si disponible)";

  return (
    <div className="bg-white rounded-lg border p-3" style={{ borderColor: "#E7E1D3" }}>
      {!facture.ligneId && (
        <div className="mb-2 px-3 py-2 rounded-lg text-[11px] flex items-center gap-2 flex-wrap" style={{ background: "#FBE7E5", color: "#B33A3A" }}>
          <AlertTriangle size={13} />
          <span>Non rattachée à un budget — ses paiements ne sont pas déduits du disponible.</span>
          <select value={ligneChoisie} onChange={(e) => { setLigneChoisie(e.target.value); if (e.target.value) onAttacherLigne(e.target.value); }}
            className="px-2 py-1 rounded border text-[11px]" style={{ borderColor: "#DCD5C4" }}>
            <option value="">Rattacher à...</option>
            {(lignes || []).map((l) => <option key={l.id} value={l.id}>{l.libelle}</option>)}
          </select>
        </div>
      )}
      <div className="flex items-center justify-between">
        <div>
          <div className="text-sm font-bold">{facture.objet}</div>
          <div className="text-[11px] text-gray-500">
            Montant : {gnf(facture.montant)}{montantPaye > 0 && ` · Payé : ${gnf(montantPaye)} · Reste : ${gnf(resteDu)}`}
            {ligne && ` · Budget : ${ligne.libelle}`}
          </div>
        </div>
        <div className="flex items-center gap-3">
          <span
            className="px-2.5 py-1 rounded-full text-[11px] font-bold"
            style={soldee ? { background: "#E6F0E9", color: "#2F6844" } : montantPaye > 0 ? { background: "#EAEDF3", color: "#35506B" } : { background: "#FBF0DC", color: "#8F6A21" }}
          >
            {soldee ? "Payée" : montantPaye > 0 ? "Partiellement payée" : "Due"}
          </span>
          {!soldee && <button onClick={() => (payOpen ? setPayOpen(false) : ouvrirPaiement())} className="text-xs font-bold" style={{ color: BORDEAUX }}>Enregistrer un paiement</button>}
          <button onClick={onDelete}><Trash2 size={13} color="#8B8578" /></button>
        </div>
      </div>

      {paiements.length > 0 && (
        <div className="mt-2 pt-2 border-t space-y-1" style={{ borderColor: "#F0EBDF" }}>
          {paiements.map((p) => (
            <div key={p.id} className="flex items-center justify-between text-[11px] text-gray-500">
              <span>
                {p.date} · {gnf(p.montant)} · {p.mode}
                {p.reference ? ` · ${p.mode === "Chèque" ? "Chèque n°" : "Reçu n°"} ${p.reference}` : " · aucune référence enregistrée"}
                {p.enregistrePar ? ` · par ${p.enregistrePar}` : ""}
              </span>
              <button onClick={() => onSupprimerPaiement(p.id)}><Trash2 size={12} color="#B8B0A0" /></button>
            </div>
          ))}
        </div>
      )}

      {payOpen && !soldee && (
        <div className="mt-3 pt-3 border-t grid grid-cols-1 md:grid-cols-2 gap-3 items-end" style={{ borderColor: "#F0EBDF" }}>
          <Field label={`Montant à payer (GNF) — reste dû : ${gnf(resteDu)}`} type="number" value={montant} onChange={setMontant} placeholder="0" />
          <div>
            <label className="text-xs font-bold block mb-1.5">Mode de paiement</label>
            <select value={mode} onChange={(e) => setMode(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border text-sm" style={{ borderColor: "#DCD5C4", background: "#FCFAF5" }}>
              {["Espèces", "Virement bancaire", "Chèque", "Mobile Money"].map((m) => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <Field label="Date du paiement" type="date" value={datePaiement} onChange={setDatePaiement} />
          <Field label={referenceLabel} value={reference} onChange={setReference} placeholder={mode === "Chèque" ? "Ex. 0021458" : "Ex. REC-2026-014"} />
          {estAvance && (
            <div className="md:col-span-2 px-3 py-2 rounded-lg text-[11px]" style={{ background: "#F6F0E0", color: "#8F6A21" }}>
              Ceci est une avance : il restera {gnf(resteDu - Number(montant || 0))} dû sur cette facture après ce paiement.
            </div>
          )}
          <button
            onClick={confirmer}
            disabled={mode === "Chèque" && !reference}
            className="px-4 py-2.5 rounded-lg text-sm font-bold text-white md:col-span-2 disabled:opacity-40"
            style={{ background: "#2F6844", width: "fit-content" }}
          >
            Confirmer le paiement
          </button>
        </div>
      )}
    </div>
  );
}

// ---------------- Rapport ----------------
function RapportTab({ data }) {
  const [periode, setPeriode] = useState("semaine");
  const [debut, setDebut] = useState(startOfWeekISO());
  const [fin, setFin] = useState(todayISO());
  const [copied, setCopied] = useState(false);

  function choisir(p) {
    setPeriode(p);
    if (p === "semaine") { setDebut(startOfWeekISO()); setFin(todayISO()); }
    if (p === "mois") { setDebut(startOfMonthISO()); setFin(todayISO()); }
  }

  const depensesPeriode = data.depenses.filter((d) => d.date >= debut && d.date <= fin);
  const totalDemande = depensesPeriode.reduce((s, d) => s + Number(d.montant), 0);
  const totalValidee = depensesPeriode.filter((d) => d.statut === "validee" || d.statut === "payee").reduce((s, d) => s + Number(d.montant), 0);
  const totalPayee = depensesPeriode.filter((d) => d.statut === "payee").reduce((s, d) => s + Number(d.montant), 0);
  const totalAttente = depensesPeriode.filter((d) => d.statut === "attente").reduce((s, d) => s + Number(d.montant), 0);
  const totalRejetee = depensesPeriode.filter((d) => d.statut === "rejetee").reduce((s, d) => s + Number(d.montant), 0);

  const paiementsFournisseurs = [];
  data.fournisseurs.forEach((f) => (f.factures || []).forEach((fa) => (fa.paiements || []).forEach((p) => {
    if (p.date >= debut && p.date <= fin) {
      paiementsFournisseurs.push({ ...p, fournisseur: f.nom, objet: fa.objet });
    }
  })));
  const totalPaiementsFournisseurs = paiementsFournisseurs.reduce((s, p) => s + Number(p.montant), 0);

  const budgetAlloue = data.lignes.reduce((s, l) => s + (Number(l.alloue) || 0), 0);
  const budgetEngage = data.lignes.reduce((s, l) => s + (Number(l.engage) || 0), 0);
  const budgetDisponible = budgetAlloue - budgetEngage;

  function texteRapport() {
    let t = `RAPPORT BUDGÉTAIRE — DCI\nPériode : du ${fmtDateFR(debut)} au ${fmtDateFR(fin)}\n\n`;
    t += `SITUATION BUDGÉTAIRE GLOBALE (à ce jour)\nAlloué : ${gnf(budgetAlloue)}\nEngagé : ${gnf(budgetEngage)}\nDisponible : ${gnf(budgetDisponible)}\n\n`;
    t += `DÉPENSES DE LA PÉRIODE (${depensesPeriode.length})\nDemandées : ${gnf(totalDemande)}\nValidées : ${gnf(totalValidee)}\nPayées : ${gnf(totalPayee)}\nEn attente : ${gnf(totalAttente)}\nRejetées : ${gnf(totalRejetee)}\n\n`;
    depensesPeriode.forEach((d) => { t += `  • [${d.date}] ${d.objet} — ${gnf(d.montant)} — ${STATUT_STYLES[d.statut]?.label} — créée par ${d.creePar || "—"}\n`; });
    t += `\nPAIEMENTS FOURNISSEURS DE LA PÉRIODE (${paiementsFournisseurs.length}) — Total : ${gnf(totalPaiementsFournisseurs)}\n`;
    paiementsFournisseurs.forEach((p) => { t += `  • [${p.date}] ${p.fournisseur} — ${p.objet} — ${gnf(p.montant)} — ${p.mode || "—"} — ${p.mode === "Chèque" ? "Chèque" : "Reçu"} n° ${p.reference || "non renseigné"}\n`; });
    return t;
  }

  async function copier() {
    try {
      await navigator.clipboard.writeText(texteRapport());
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch (e) {}
  }

  return (
    <div>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5 print:hidden">
        <div className="flex gap-2">
          {[["semaine", "Cette semaine"], ["mois", "Ce mois-ci"], ["libre", "Période libre"]].map(([id, label]) => (
            <button key={id} onClick={() => choisir(id)} className="px-3 py-2 rounded-lg text-xs font-bold"
              style={{ background: periode === id ? BORDEAUX : "#fff", color: periode === id ? "#fff" : "#21242B", border: "1px solid #E7E1D3" }}>
              {label}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-2">
          {periode === "libre" && (
            <>
              <Field label="" type="date" value={debut} onChange={setDebut} />
              <span className="text-xs text-gray-400 mb-2">à</span>
              <Field label="" type="date" value={fin} onChange={setFin} />
            </>
          )}
          <button onClick={() => window.print()} className="px-3 py-2.5 rounded-lg text-xs font-bold text-white flex items-center gap-1.5" style={{ background: BORDEAUX }}>
            <Printer size={13} /> Imprimer
          </button>
          <button onClick={copier} className="px-3 py-2.5 rounded-lg text-xs font-bold flex items-center gap-1.5" style={{ background: "#fff", border: "1px solid #E7E1D3", color: "#21242B" }}>
            <Copy size={13} /> {copied ? "Copié !" : "Copier le texte"}
          </button>
        </div>
      </div>

      <div className="bg-white rounded-xl border p-6" style={{ borderColor: "#E7E1D3" }}>
        <div className="text-center mb-6 pb-4 border-b" style={{ borderColor: "#E7E1D3" }}>
          <div className="text-[10px] uppercase tracking-wider font-bold" style={{ color: OR }}>Direction de la Communication et de l'Information</div>
          <h2 className="font-serif text-xl mt-1">Rapport budgétaire</h2>
          <div className="text-xs text-gray-500 mt-1">Période du {fmtDateFR(debut)} au {fmtDateFR(fin)}</div>
        </div>

        <h3 className="text-xs font-bold uppercase tracking-wide mb-2" style={{ color: BORDEAUX }}>Situation budgétaire globale (à ce jour)</h3>
        <div className="grid grid-cols-3 gap-3 mb-6">
          {[["Alloué", budgetAlloue], ["Engagé", budgetEngage], ["Disponible", budgetDisponible]].map(([l, v]) => (
            <div key={l} className="rounded-lg p-3" style={{ background: "#F6F4EE" }}>
              <div className="text-[10px] uppercase text-gray-400">{l}</div>
              <div className="font-serif text-lg">{gnf(v)}</div>
            </div>
          ))}
        </div>

        <h3 className="text-xs font-bold uppercase tracking-wide mb-2" style={{ color: BORDEAUX }}>Dépenses de la période ({depensesPeriode.length})</h3>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 text-xs">
          <div>Validées : <b>{gnf(totalValidee)}</b></div>
          <div>Payées : <b>{gnf(totalPayee)}</b></div>
          <div>En attente : <b>{gnf(totalAttente)}</b></div>
          <div>Rejetées : <b>{gnf(totalRejetee)}</b></div>
        </div>
        {depensesPeriode.length === 0 ? (
          <p className="text-xs text-gray-400 mb-6">Aucune dépense sur cette période.</p>
        ) : (
          <table className="w-full text-xs mb-6">
            <thead><tr className="text-left text-gray-400 border-b" style={{ borderColor: "#E7E1D3" }}>
              <th className="py-1.5">Date</th><th>Objet</th><th>Montant</th><th>Statut</th><th>Créée par</th>
            </tr></thead>
            <tbody>
              {depensesPeriode.map((d) => (
                <tr key={d.id} className="border-b" style={{ borderColor: "#F4F1EC" }}>
                  <td className="py-1.5">{d.date}</td><td>{d.objet}</td><td>{gnf(d.montant)}</td>
                  <td>{STATUT_STYLES[d.statut]?.label}</td><td>{d.creePar || "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}

        <h3 className="text-xs font-bold uppercase tracking-wide mb-2" style={{ color: BORDEAUX }}>
          Paiements fournisseurs de la période ({paiementsFournisseurs.length}) — {gnf(totalPaiementsFournisseurs)}
        </h3>
        {paiementsFournisseurs.length === 0 ? (
          <p className="text-xs text-gray-400">Aucun paiement fournisseur sur cette période.</p>
        ) : (
          <table className="w-full text-xs">
            <thead><tr className="text-left text-gray-400 border-b" style={{ borderColor: "#E7E1D3" }}>
              <th className="py-1.5">Date</th><th>Fournisseur</th><th>Facture</th><th>Montant</th><th>Mode</th><th>Reçu n°</th>
            </tr></thead>
            <tbody>
              {paiementsFournisseurs.map((p, i) => (
                <tr key={p.id || i} className="border-b" style={{ borderColor: "#F4F1EC" }}>
                  <td className="py-1.5">{p.date}</td><td>{p.fournisseur}</td><td>{p.objet}</td>
                  <td>{gnf(p.montant)}</td><td>{p.mode || "—"}</td><td>{p.reference || "non renseigné"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function CodesAccesPanel({ codes, onSaveCodes }) {
  const [valeurs, setValeurs] = useState(() => {
    const v = {};
    ROLES.forEach((r) => (v[r] = codes?.[r] || ""));
    return v;
  });
  const [saved, setSaved] = useState(false);

  function maj(role, val) {
    setValeurs({ ...valeurs, [role]: val });
    setSaved(false);
  }
  function enregistrer() {
    onSaveCodes(valeurs);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  return (
    <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
      <h3 className="font-serif text-lg mb-1">Codes d'accès par rôle</h3>
      <p className="text-xs text-gray-500 mb-4">
        Définissez un code pour chaque rôle et communiquez-le uniquement à la bonne personne. Une fois un code défini, il faudra le saisir pour se déclarer sous ce rôle.
        Ceci décourage les erreurs et les abus courants — ce n'est pas un chiffrement, une personne techniquement avertie pourrait le contourner.
      </p>
      <div className="space-y-2 mb-4">
        {ROLES.map((r) => (
          <div key={r} className="grid grid-cols-1 md:grid-cols-2 gap-2 items-end">
            <div className="text-xs font-bold text-gray-600 md:pb-2.5">{r}</div>
            <Field label="" type="text" value={valeurs[r]} onChange={(v) => maj(r, v)} placeholder="Laisser vide = pas de code requis" />
          </div>
        ))}
      </div>
      <button onClick={enregistrer} className="px-4 py-2.5 rounded-lg text-sm font-bold text-white" style={{ background: BORDEAUX }}>
        {saved ? "Enregistré ✓" : "Enregistrer les codes"}
      </button>
    </div>
  );
}

        <ul className="text-xs text-gray-600 space-y-1.5 list-disc pl-4">
          <li>Parcours guidé pour la demande de dépense, sans vocabulaire comptable</li>
          <li>Vérification du budget affichée en temps réel avant validation</li>
          <li>Statuts toujours identifiés par une couleur et un mot simple (Due, Payée, Validée...)</li>
        </ul>
      </div>

      <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
        <h3 className="font-serif text-lg mb-1">Modèle de données (livrable 7)</h3>
        <p className="text-xs text-gray-500 mb-3">Entités prévues pour la base définitive — état de présence dans cet outil.</p>
        <table className="w-full text-xs">
          <tbody>
            {[
              ["Utilisateur / identité", true],
              ["Ligne budgétaire", true],
              ["Dépense", true],
              ["Engagement", true],
              ["Paiement", true],
              ["Fournisseur", true],
              ["Facture fournisseur", true],
              ["Contrat", false],
              ["Mission", false],
              ["Véhicule / carburant", false],
              ["Article de stock", false],
              ["Document archivé", false],
              ["Instance de workflow", false],
              ["Journal d'audit inaltérable", false],
            ].map(([e, present]) => (
              <tr key={e} className="border-b" style={{ borderColor: "#F0EBDF" }}>
                <td className="py-2 text-gray-600">{e}</td>
                <td className="py-2 text-right font-bold" style={{ color: present ? "#2F6844" : "#B8B0A0" }}>{present ? "Présent ici" : "Prévu plus tard"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
        <h3 className="font-serif text-lg mb-1">Plan de déploiement prévu (livrable 10)</h3>
        <p className="text-xs text-gray-500 mb-3">Pour la bascule vers la version définitive, une fois développée.</p>
        <div className="space-y-2 mb-3">
          {[
            ["1. Pilote", "Une division volontaire, 4 semaines, en parallèle d'Excel par sécurité"],
            ["2. Extension", "Généralisation division par division, une à deux par semaine"],
            ["3. Généralisation", "Excel et papier retirés une fois toutes les divisions basculées"],
          ].map(([t, d]) => (
            <div key={t} className="flex gap-2 text-xs">
              <span className="font-bold flex-shrink-0" style={{ color: BORDEAUX }}>{t}</span>
              <span className="text-gray-500">{d}</span>
            </div>
          ))}
        </div>
        <p className="text-[11px] text-gray-400">Cet outil provisoire joue déjà, dans les faits, le rôle du pilote : il permet à la direction de prendre l'habitude de saisir et suivre ses données avant le passage à la version sécurisée.</p>
      </div>

      <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
        <h3 className="font-serif text-lg mb-1">Où en est le vrai projet ?</h3>
        <p className="text-xs text-gray-500 mb-4">Cet outil est une version provisoire et interne. Le développement complet, sécurisé et avec de vrais comptes suit la feuille de route ci-dessous (livrable 9).</p>
        <div className="space-y-3">
          {phases.map((p) => (
            <div key={p.titre} className="flex gap-3 items-start border-l-2 pl-3" style={{ borderColor: OR }}>
              <div className="flex-1">
                <div className="text-sm font-bold">{p.titre}</div>
                <div className="text-xs text-gray-500">{p.contenu}</div>
                <div className="text-[11px] font-bold mt-0.5" style={{ color: BORDEAUX }}>{p.statut}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
        <h3 className="font-serif text-lg mb-1">Seuils de validation appliqués ici</h3>
        <p className="text-xs text-gray-500 mb-4">Repris du livrable 8 : le niveau requis affiché dans l'onglet Dépenses détermine qui peut valider.</p>
        <table className="w-full text-xs">
          <tbody>
            {seuils.map(([tranche, role]) => (
              <tr key={tranche} className="border-b" style={{ borderColor: "#F0EBDF" }}>
                <td className="py-2 text-gray-500">{tranche}</td>
                <td className="py-2 font-bold text-right" style={{ color: BORDEAUX }}>{role}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="bg-white rounded-xl border p-5" style={{ borderColor: "#E7E1D3" }}>
        <h3 className="font-serif text-lg mb-1">Principes techniques retenus (livrable 4)</h3>
        <p className="text-xs text-gray-500 mb-4">À respecter pour la version définitive.</p>
        <ul className="text-xs text-gray-600 space-y-1.5 list-disc pl-4">
          <li>Hébergement souverain — Data Center national de Guinée (Tier III, inauguré septembre 2025)</li>
          <li>Authentification individuelle avec second facteur pour les rôles sensibles</li>
          <li>Journalisation inaltérable de toute action (qui, quoi, quand)</li>
          <li>Sauvegarde automatique quotidienne, conservée au moins 90 jours</li>
          <li>Assistant IA fondé uniquement sur les données réelles de la plateforme</li>
        </ul>
      </div>
    </div>
  );
}

function GuideModal({ onClose }) {
  const sections = [
    {
      titre: "Se repérer",
      points: [
        "Le Tableau de bord montre en un coup d'œil votre budget disponible et ce qui attend votre attention.",
        "Le menu (à gauche sur ordinateur, en bas sur téléphone) permet de changer d'onglet à tout moment.",
      ],
    },
    {
      titre: "Créer votre budget",
      points: [
        "Allez dans Budget → « Nouvelle ligne budgétaire ». Donnez un libellé clair (ex. « Fonctionnement »), la période et le montant alloué.",
        "Le total en bas du tableau vous montre toujours le solde disponible global.",
      ],
    },
    {
      titre: "Enregistrer une dépense",
      points: [
        "Dans Dépenses → « Nouvelle demande », choisissez la ligne budgétaire concernée : le disponible s'affiche automatiquement.",
        "La colonne « Niveau requis » indique qui doit valider selon le montant. Seule la personne identifiée avec ce rôle peut cliquer sur ✓.",
        "Une fois validée, marquez-la « payée » quand l'argent est effectivement sorti.",
      ],
    },
    {
      titre: "Suivre un fournisseur",
      points: [
        "Dans Fournisseurs, ouvrez une fiche pour ajouter ses factures une par une.",
        "Quand vous payez une facture, indiquez le mode de paiement et le numéro de reçu si vous en avez un — utile en cas de contestation plus tard.",
      ],
    },
    {
      titre: "Sortir un rapport",
      points: [
        "Dans Rapport, choisissez « Cette semaine » ou « Ce mois-ci ».",
        "Le bouton Imprimer ouvre l'impression du navigateur ; « Copier le texte » permet de coller le rapport dans un message ou un document.",
      ],
    },
    {
      titre: "S'identifier",
      points: [
        "Cliquez sur votre profil (barre latérale ou badge en haut à droite sur téléphone) pour indiquer votre nom et votre rôle.",
        "Ce n'est pas un mot de passe : c'est ce qui permet de savoir qui a créé et qui a validé chaque dépense.",
      ],
    },
  ];
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{ background: "rgba(33,36,43,0.6)" }} onClick={onClose}>
      <div className="bg-white rounded-xl w-full max-w-lg max-h-[85vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="sticky top-0 bg-white px-6 pt-5 pb-3 border-b flex items-center justify-between" style={{ borderColor: "#E7E1D3" }}>
          <div>
            <div className="text-[10px] uppercase tracking-wider font-bold" style={{ color: OR }}>Guide d'utilisation</div>
            <h3 className="font-serif text-lg">Comment utiliser la plateforme</h3>
          </div>
          <button onClick={onClose}><X size={18} color="#8B8578" /></button>
        </div>
        <div className="p-6 space-y-5">
          {sections.map((s) => (
            <div key={s.titre}>
              <div className="text-sm font-bold mb-1.5" style={{ color: BORDEAUX }}>{s.titre}</div>
              <ul className="text-xs text-gray-600 space-y-1 list-disc pl-4">
                {s.points.map((pt, i) => <li key={i}>{pt}</li>)}
              </ul>
            </div>
          ))}
          <p className="text-[11px] text-gray-400 pt-2 border-t" style={{ borderColor: "#F0EBDF" }}>
            Un doute persistant ? Consultez l'onglet Projet pour comprendre où en est le vrai développement de la plateforme.
          </p>
        </div>
      </div>
    </div>
  );
}

function IdentityModal({ me, codes, onSave, onClose }) {
  const [nom, setNom] = useState(me?.nom || "");
  const [role, setRole] = useState(me?.role || "");
  const [code, setCode] = useState("");
  const [erreur, setErreur] = useState("");
  const codeRequis = role && codes && codes[role];

  function valider() {
    if (!nom || !role) return;
    if (codeRequis && code !== codes[role]) {
      setErreur("Code incorrect pour ce rôle.");
      return;
    }
    onSave(nom, role);
  }

  return (
    <div className="fixed inset-0 z-30 flex items-center justify-center p-5" style={{ background: "rgba(33,36,43,0.55)" }}>
      <div className="bg-white rounded-xl p-6 w-full max-w-sm">
        <h3 className="font-serif text-lg mb-1">Qui êtes-vous ?</h3>
        <p className="text-xs text-gray-500 mb-4">Cette information sert à identifier qui crée et qui valide chaque dépense.</p>
        <Field label="Votre nom" value={nom} onChange={setNom} placeholder="Ex. Oumar Barry" />
        <div className="mt-3 mb-3">
          <label className="text-xs font-bold block mb-1.5">Votre rôle</label>
          <select value={role} onChange={(e) => { setRole(e.target.value); setCode(""); setErreur(""); }} className="w-full px-3 py-2.5 rounded-lg border text-sm" style={{ borderColor: "#DCD5C4", background: "#FCFAF5" }}>
            <option value="">Sélectionner...</option>
            {ROLES.map((r) => <option key={r} value={r}>{r}</option>)}
          </select>
        </div>
        {role && (
          codeRequis ? (
            <div className="mb-2">
              <Field label="Code d'accès pour ce rôle" type="password" value={code} onChange={(v) => { setCode(v); setErreur(""); }} placeholder="••••" />
              {erreur && <p className="text-[11px] text-red-600 mt-1">{erreur}</p>}
            </div>
          ) : (
            <p className="text-[11px] mb-2" style={{ color: "#B33A3A" }}>Aucun code n'a encore été configuré pour ce rôle (onglet Projet) — n'importe qui peut encore se déclarer ainsi.</p>
          )
        )}
        <div className="flex gap-2 justify-end mt-3">
          {me && <button onClick={onClose} className="px-4 py-2 rounded-lg text-sm font-bold" style={{ color: "#8B8578" }}>Annuler</button>}
          <button onClick={valider} className="px-4 py-2 rounded-lg text-sm font-bold text-white" style={{ background: BORDEAUX }}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, placeholder, type = "text" }) {
  return (
    <div>
      <label className="text-xs font-bold block mb-1.5">{label}</label>
      <input
        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        className="w-full px-3 py-2.5 rounded-lg border text-sm"
        style={{ borderColor: "#DCD5C4", background: "#FCFAF5" }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Bootstrap />);
</script>
</body>
</html>
